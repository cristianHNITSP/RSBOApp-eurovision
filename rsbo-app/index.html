<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>RSBO</title>

    <!-- 🔒 Oculta contenido mientras no se defina tema -->
    <style>
      html:not([data-theme]) {
        visibility: hidden;
        opacity: 0;
        background: #000 !important;
        color: #000 !important;
      }

      html[data-theme] {
        visibility: visible;
        opacity: 1;
        transition: opacity 0.2s ease-in;
      }
    </style>

    <style>
      /* Ocultar scrollbar y bloquear scroll */

      /* Para todo el documento */
      html,
      body {
        overflow: hidden !important;
      }

      /* Si quieres ocultar scrollbar pero permitir scroll (scroll invisible) */
      /*
  html, body {
    overflow: auto;
  }
  ::-webkit-scrollbar {
    display: none; /* Chrome, Safari y Edge */
      /* }
  scrollbar-width: none; /* Firefox */
    </style>

    <!-- 🌙 Aplica tema y tamaño de fuente lo antes posible -->
    <script>
      (function () {
        const html = document.documentElement;

        // Tema — lee la clave del composable (ui-theme) con fallback a la antigua (dark-mode)
        const saved = localStorage.getItem("ui-theme") || localStorage.getItem("dark-mode");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        let dark;
        if (saved === "dark")       dark = true;
        else if (saved === "light") dark = false;
        else if (saved === "true")  dark = true;   // backward compat
        else if (saved === "false") dark = false;  // backward compat
        else                        dark = prefersDark;

        html.setAttribute("data-theme", dark ? "dark" : "light");
        html.style.colorScheme = dark ? "dark" : "light";

        // Tamaño de fuente — evita layout shift al cargar
        const sizes = { xs: "85%", sm: "92.5%", md: "100%", lg: "112.5%" };
        const fzKey = localStorage.getItem("ui-font-size") || localStorage.getItem("user-font-size") || "md";
        html.style.fontSize = sizes[fzKey] || "100%";
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
