# ============================================================
# RSBO APP - DOCKER COMPOSE PRODUCTION (HARDENING)
# ============================================================

services:
  # ─── GATEWAY EDGE (Nginx + API Node en un solo contenedor) ────────────────
  # nginx sirve el SPA (Vite) y proxya /api, /admin, /ws al Node interno.
  # Sustituye al antiguo contenedor rsbo-frontend: nginx ya vive AQUÍ.
  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
    ports:
      - "127.0.0.1:${FRONTEND_PORT_HOST:-4300}:80"
    # nginx (master) necesita root para bind :80; la base fija user=node → lo revertimos aquí.
    user: "root"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  # ─── AUTH & ADMIN ─────────────────────────────────────────
  auth-service:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M # Incrementado para soportar AdminJS + Auth

  # ─── MICROSERVICES ────────────────────────────────────────
  inventory-service:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  # optica-service:
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

  notification-service:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── INFRASTRUCTURE ───────────────────────────────────────
  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 320M

  mongo:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
