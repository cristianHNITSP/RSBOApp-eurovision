# ==============================================================================
# nginx edge del Gateway — sirve el SPA (Vite) y proxya /api, /admin, /ws al
# proceso Node del MISMO contenedor (127.0.0.1:3000).
#
# Seguridad:
#  - server_tokens off + se oculta la cabecera Server del upstream (no exponer
#    tecnología/versión).
#  - Cabeceras de seguridad definidas UNA sola vez a nivel server; las locations
#    proxiadas hacen `proxy_hide_header` de las mismas para que NUNCA lleguen
#    duplicadas (el upstream Node/helmet también las pone) → strip-then-add.
#  - Se preservan Cookie y X-CSRF-Token hacia el backend (CSRF doble-submit).
#  - client_max_body_size 3m: el Node aplica límites finos (2mb inventario /
#    256kb resto); nginx no debe cortar antes los chunks de dioptrías.
# ==============================================================================

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  server_tokens off;                 # oculta la versión de nginx
  client_max_body_size 3m;

  root /usr/share/nginx/html;
  index index.html;

  resolver 127.0.0.11 ipv6=off valid=10s;

  # ── Cabeceras de seguridad (ÚNICA fuente). Se heredan a las locations que NO
  #    declaren su propio add_header. Usamos `expires` para caché (no resetea
  #    la herencia de add_header). ──
  add_header X-Content-Type-Options  "nosniff"                              always;
  add_header X-Frame-Options         "SAMEORIGIN"                           always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin"      always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # efectiva tras TLS

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── API REST → Node interno ──────────────────────────────────────────────
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # Anti doble-cabecera: descartar lo que ponga el upstream (Node/helmet) y
    # ocultar su identidad; nginx re-aplica las cabeceras heredadas una sola vez.
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  # ── AdminJS → Node interno ───────────────────────────────────────────────
  location /admin {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  # ── WebSocket (/ws del gateway) ──────────────────────────────────────────
  location /ws {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1h;
    proxy_hide_header Server;
  }

  # ── Assets con hash → caché larga (no resetea add_header) ────────────────
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    # repetimos las de seguridad porque este bloque define su propio add_header
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    try_files $uri =404;
  }

  # ── SPA (Vite) ───────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
