# version: '3.9'
# Comandos útiles:
# - Iniciar todos: docker start $(docker ps -a -q)
# - Detener todos: docker stop $(docker ps -q)
# - Reconstruir: docker-compose down && docker-compose up --build
# - entrar al contenedor para ejecutar seed users: docker exec -it rsboapp-backend sh || docker exec -it rsboapp-backend npm run seed-users
# - corre el file seed-users: npm run seed-users

# PUERTOS:
#API (Express): http://localhost:3000
#Mongo Express (solo desde tu máquina): http://localhost:8081

# DESPLIGUE:
# desarrollo: docker-compose --profile dev up --build
# producción: docker-compose --profile prod up --build

# duerme wsl hasta que lo vuelva abrir: wsl --shutdown

# Se reconstruirá la imagen e instalará todas las dependencias nuevas, incluyendo cors.
# docker-compose build --no-cache
# docker-compose up

#Nuevos comandos
#sudo docker compose --profile dev up --build
#sudo docker compose --profile prod up --build
#sudo docker compose --profile dev up --build auth-service
#sudo docker compose --profile dev up auth-service gateway mongo mongo-express
#sudo docker compose --profile dev down

#Ejecutar la semillas de auth-service
#sudo docker exec -it rsboapp-auth npm run seed-users


# ver logs -f es para seguir los actualizados
# sudo docker logs -f rsboapp-inventory
# sudo docker logs rsboapp-inventory
# sudo docker logs -f rsboapp-auth

services:
  # Auth Service
  auth-service:
    build:
      context: ./backend/auth-service
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: rsboapp-auth
    ports:
      - "${AUTH_PORT_HOST:-3001}:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/auth-service:/app
      - /app/node_modules
    env_file:
      - ./backend/auth-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongo}:${MONGO_PORT:-27017}/${AUTH_DB:-auth_db}?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # Inventory Service
  inventory-service:
    build:
      context: ./backend/inventory-service
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: rsboapp-inventory
    ports:
      - "${INVENTORY_PORT_HOST:-3002}:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/inventory-service:/app
      - /app/node_modules
    env_file:
      - ./backend/inventory-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongo}:${MONGO_PORT:-27017}/${INVENTORY_DB:-inventory_db}?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # Orders Service
  orders-service:
    build:
      context: ./backend/orders-service
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: rsboapp-orders
    ports:
      - "${ORDERS_PORT_HOST:-3003}:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/orders-service:/app
      - /app/node_modules
    env_file:
      - ./backend/orders-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongo}:${MONGO_PORT:-27017}/${ORDERS_DB:-orders_db}?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # Notification Service
  notification-service:
    build:
      context: ./backend/notification-service
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: rsboapp-notification
    ports:
      - "${NOTIFICATION_PORT_HOST:-3004}:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/notification-service:/app
      - /app/node_modules
    env_file:
      - ./backend/notification-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongo}:${MONGO_PORT:-27017}/${NOTIFICATION_DB:-notification_db}?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # Gateway
  gateway:
    build:
      context: ./backend/gateway
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: rsboapp-gateway
    ports:
      - "${GATEWAY_PORT_HOST:-3000}:3000"
    depends_on:
      - auth-service
      - inventory-service
      - orders-service
      - notification-service
    volumes:
      - ./backend/gateway:/app
      - /app/node_modules
    env_file:
      - ./backend/gateway/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # MongoDB
  mongo:
    image: mongo:6
    container_name: rsboapp-mongo
    ports:
      - "${MONGO_PORT_HOST:-27017}:27017"
    volumes:
      - rsbo-mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    restart: always
    networks:
      - rsbo-net

  # Mongo Express
  mongo-express:
    image: mongo-express
    container_name: rsboapp-mongo-express
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT_HOST:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: ${MONGO_HOST:-mongo}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_BASICAUTH_PASSWORD}
    depends_on:
      - mongo
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

networks:
  rsbo-net:
    driver: bridge

volumes:
  rsbo-mongo-data:
    driver: local
