# ============================================================
# RSBO APP - DOCKER COMPOSE BASE (INDUSTRIAL GRADE v3)
# ============================================================

# Anchors para evitar repetición y errores humanos
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-node: &node-healthcheck
  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s # Tiempo de gracia para el boot de Node

services:
  # ─── GATEWAY (Entry point) ────────────────────────────────
  gateway:
    build: { context: ./backend/gateway }
    container_name: rsboapp-gateway
    env_file: [./.env, ./backend/gateway/.env]
    depends_on:
      auth-service: { condition: service_healthy }
    networks: [rsbo-net]
    user: "node"
    healthcheck: *node-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # ─── AUTH SERVICE (Includes AdminJS) ──────────────────────
  auth-service:
    build: { context: ./backend/auth-service }
    container_name: rsboapp-auth
    env_file: [./.env, ./backend/auth-service/.env]
    environment:
      INVENTORY_MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${INVENTORY_DB}?authSource=admin"
      NOTIFICATION_MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${NOTIFICATION_DB}?authSource=admin"
      # OPTICA_MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${OPTICA_DB}?authSource=admin"
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${AUTH_DB}?authSource=admin"
    depends_on:
      mongo: { condition: service_healthy }
    networks: [rsbo-net]
    user: "node"
    healthcheck: *node-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # ─── INVENTORY SERVICE ────────────────────────────────────
  inventory-service:
    build: { context: ./backend/inventory-service }
    container_name: rsboapp-inventory
    env_file: [./.env, ./backend/inventory-service/.env]
    environment:
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${INVENTORY_DB}?authSource=admin"
      REDIS_URL: "redis://redis:6379"
      # GATEWAY_WS_URL: "ws://gateway:3000/ws-internal"
      NOTIFICATION_SERVICE_INTERNAL_URL: "http://notification-service:3000"
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [rsbo-net]
    user: "node"
    healthcheck: *node-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # ─── OPTICA SERVICE ───────────────────────────────────────
  # optica-service:
  #   build: { context: ./backend/optica-service }
  #   container_name: rsboapp-optica
  #   env_file: [./.env, ./backend/optica-service/.env]
  #   environment:
  #     MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${OPTICA_DB}?authSource=admin"
  #     GATEWAY_WS_URL: "ws://gateway:3000/ws-internal"
  #   depends_on:
  #     mongo: { condition: service_healthy }
  #   networks: [rsbo-net]
  #   user: "node"
  #   healthcheck: *node-healthcheck
  #   logging: *default-logging
  #   restart: unless-stopped

  # ─── NOTIFICATION SERVICE ─────────────────────────────────
  notification-service:
    build: { context: ./backend/notification-service }
    container_name: rsboapp-notification
    env_file: [./.env, ./backend/notification-service/.env]
    environment:
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${NOTIFICATION_DB}?authSource=admin"
      # GATEWAY_WS_URL: "ws://gateway:3000/ws-internal"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [rsbo-net]
    user: "node"
    healthcheck: *node-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # ─── INFRASTRUCTURE ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rsboapp-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    networks: [rsbo-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: rsboapp-mongo
    volumes:
      - rsbo-mongo-data:/data/db
    env_file: [./.env]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks: [rsbo-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

networks:
  rsbo-net:
    driver: bridge

volumes:
  rsbo-mongo-data:
    driver: local
