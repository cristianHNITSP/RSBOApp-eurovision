<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <title>RSBO</title>

  <!-- 🔒 Oculta contenido mientras no se defina tema -->
  <style>
    html:not([data-theme]) {
      visibility: hidden;
      opacity: 0;
      background: #000 !important;
      color: #000 !important;
    }

    html[data-theme] {
      visibility: visible;
      opacity: 1;
      transition: opacity 0.2s ease-in;
    }
  </style>

  <style>
    /* Ocultar scrollbar y bloquear scroll */

    /* Para todo el documento */
    html,
    body {
      overflow: hidden !important;
    }

    /* Si quieres ocultar scrollbar pero permitir scroll (scroll invisible) */
    /*
  html, body {
    overflow: auto;
  }
  ::-webkit-scrollbar {
    display: none; /* Chrome, Safari y Edge */
    /* }
  scrollbar-width: none; /* Firefox */
  </style>


  <!-- 🌙 Aplica tema lo antes posible -->
  <script>
    (function () {
      const html = document.documentElement;
      const saved = localStorage.getItem("dark-mode");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const dark = saved === "true" || (!saved && prefersDark);

      html.setAttribute("data-theme", dark ? "dark" : "light");
      html.style.colorScheme = dark ? "dark" : "light";
    })();
  </script>

</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
