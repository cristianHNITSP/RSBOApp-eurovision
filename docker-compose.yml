# version: '3.9'
# Comandos útiles:
# - Iniciar todos: docker start $(docker ps -a -q)
# - Detener todos: docker stop $(docker ps -q)
# - Reconstruir: docker-compose down && docker-compose up --build
# - entrar al contenedor para ejecutar seed users: docker exec -it rsboapp-backend sh || docker exec -it rsboapp-backend npm run seed-users
# - corre el file seed-users: npm run seed-users

# PUERTOS:
#API (Express): http://localhost:3000
#Mongo Express (solo desde tu máquina): http://localhost:8081

# DESPLIGUE:
# desarrollo: docker-compose --profile dev up --build
# producción: docker-compose --profile prod up --build

# duerme wsl hasta que lo vuelva abrir: wsl --shutdown

# Se reconstruirá la imagen e instalará todas las dependencias nuevas, incluyendo cors.
# docker-compose build --no-cache
# docker-compose up

#Nuevos comandos
#sudo docker compose --profile dev up --build
#sudo docker compose --profile prod up --build
#sudo docker compose --profile dev up --build auth-service
#sudo docker compose --profile dev up auth-service gateway mongo mongo-express
#sudo docker compose --profile dev down

#Ejecutar la semillas de auth-service
#sudo docker exec -it rsboapp-auth npm run seed-users


# ver logs -f es para seguir los actualizados
# docker logs -f rsboapp-inventory
# docker logs rsboapp-inventory


services:
  # 🚀 Auth Service
  auth-service:
    build:
      context: ./backend/auth-service
      args:
        NODE_ENV: development
    container_name: rsboapp-auth
    ports:
      - "3001:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/auth-service:/app
      - /app/node_modules
    env_file:
      - ./backend/auth-service/.env
    environment:
      NODE_ENV: development
      # 🔗 OJO: siempre apunta al mongo de ESTE compose
      MONGO_URI: "mongodb://root:${MONGO_PASSWORD}@mongo:27017/auth_db?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # 🚀 Inventory Service
  inventory-service:
    build:
      context: ./backend/inventory-service
      args:
        NODE_ENV: development
    container_name: rsboapp-inventory
    ports:
      - "3002:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/inventory-service:/app
      - /app/node_modules
    env_file:
      - ./backend/inventory-service/.env
    environment:
      NODE_ENV: development
      MONGO_URI: "mongodb://root:${MONGO_PASSWORD}@mongo:27017/inventory_db?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # 🚀 Orders Service
  orders-service:
    build:
      context: ./backend/orders-service
      args:
        NODE_ENV: development
    container_name: rsboapp-orders
    ports:
      - "3003:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/orders-service:/app
      - /app/node_modules
    env_file:
      - ./backend/orders-service/.env
    environment:
      NODE_ENV: development
      MONGO_URI: "mongodb://root:${MONGO_PASSWORD}@mongo:27017/orders_db?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # 🚀 Notification Service
  notification-service:
    build:
      context: ./backend/notification-service
      args:
        NODE_ENV: development
    container_name: rsboapp-notification
    ports:
      - "3004:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/notification-service:/app
      - /app/node_modules
    env_file:
      - ./backend/notification-service/.env
    environment:
      NODE_ENV: development
      MONGO_URI: "mongodb://root:${MONGO_PASSWORD}@mongo:27017/notification_db?authSource=admin"
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  # 🚪 Gateway
  gateway:
    build:
      context: ./backend/gateway
      args:
        NODE_ENV: development
    container_name: rsboapp-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - inventory-service
      - orders-service
      - notification-service
    volumes:
      - ./backend/gateway:/app
      - /app/node_modules
    env_file:
      - ./backend/gateway/.env
    environment:
      NODE_ENV: development
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

  #MongoDB RSBO
  mongo:
    image: mongo:6
    container_name: rsboapp-mongo
    ports:
      - "27017:27017" # Si tienes un Mongo local en 27017, puedes quitar esta línea
    volumes:
      - rsbo-mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    restart: always
    networks:
      - rsbo-net

  #Mongo Express RSBO
  mongo-express:
    image: mongo-express
    container_name: rsboapp-mongo-express
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      # Aquí usamos la forma "SERVER" porque estamos en la misma red
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: rsboapp
      ME_CONFIG_BASICAUTH_PASSWORD: admin1234
    depends_on:
      - mongo
    restart: always
    profiles: ["dev"]
    networks:
      - rsbo-net

networks:
  rsbo-net:
    driver: bridge

volumes:
  rsbo-mongo-data:
    driver: local